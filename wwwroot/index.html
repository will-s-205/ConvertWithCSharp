<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Distance Converter</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="box">
        <h2>Miles to Kilometers</h2>
        <label for="miles">Enter Miles:</label><br>
        <input type="number" id="miles" step="any"><br>
        <button onclick="convertMiles()">Convert</button><br>
        <input type="number" id="result">
        <hr>
        <h2>Fahrenheit to Celsius</h2>
        <label for="fahrenheit">Enter Fahrenheit:</label><br>
        <input type="number" id="fahrenheit" step="any"><br>
        <button onclick="convertFahrenheit()">Convert</button><br>
        <input type="number" id="fahrenheit-result">
    </div>

    <script>
        async function convertMiles() {
            const miles = document.getElementById('miles').value;
            if (!miles) return;

            const response = await fetch(`/convert-miles?miles=${miles}`);
            const data = await response.json();

            document.getElementById('result').value = data.kilometers.toFixed(1);
        }

        async function convertFahrenheit() {
            const fahrenheit = document.getElementById('fahrenheit').value;
            if (!fahrenheit) return;

            const response = await fetch(`/convert-fahrenheit?fahrenheit=${fahrenheit}`);
            const data = await response.json();

            document.getElementById('fahrenheit-result').value = data.celsius.toFixed(1);
        }
    </script>
</body>

</html>
